name: RPi_GPIO_LED_Driver_Pipeline

# Trigger the pipeline on push events
on: [push]

# Work that will be executed when the pipeline is triggered
jobs:
  style_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download checkpatch.pl
        run: |
          wget https://raw.githubusercontent.com/torvalds/linux/master/scripts/checkpatch.pl
          chmod +x checkpatch.pl

      - name: Run kernel style check
        run: |
          ./checkpatch.pl --strict --no-tree --file kernel_module/hello.c

  cross_compile_arm:
    runs-on: ubuntu-latest
    needs: style_check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install ARM cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf \
            crossbuild-essential-armhf
      
      - name: Download RPi kernel headers (pre-built)
        run: |
          sudo apt-get install -y wget
          wget https://github.com/raspberrypi/linux/releases/download/1.20250402-1/linux-headers-6.6.74-1-rpi_6.6.74-1_armhf.deb
          sudo dpkg -i linux-headers-*.deb || true
          
          ls /usr/src/ | grep linux-headers
          export RPI_KDIR=/usr/src/$(ls /usr/src/ | grep linux-headers | head -1)
          echo "Using kernel headers at: $RPI_KDIR"
      
      - name: Cross-compile hello.ko
        run: |
          cd kernel_module
          make ARCH=arm CROSS_COMPILE=arm-linux-gnueabihf- \
            KDIR=/tmp/rpi-kernel
      
      - name: Verify compiled module
        run: |
          file kernel_module/hello.ko
      
      - name: Upload .ko artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-module-arm
          path: kernel_module/hello.ko
          retention-days: 5
